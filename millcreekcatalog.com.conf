# /etc/nginx/sites-available/millcreekcatalog.com
# Symlink to /etc/nginx/sites-enabled/ to activate.
#
# Before enabling this config, obtain certificates with:
#   certbot certonly --nginx -d millcreekcatalog.com -d www.millcreekcatalog.com
#
# Certbot will handle certificate renewal automatically via its systemd
# timer or cron job. To test renewal:
#   certbot renew --dry-run

server {
    listen 80;
    listen [::]:80;
    server_name millcreekcatalog.com www.millcreekcatalog.com;

    return 301 https://millcreekcatalog.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.millcreekcatalog.com;

    ssl_certificate     /etc/letsencrypt/live/millcreekcatalog.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/millcreekcatalog.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://millcreekcatalog.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name millcreekcatalog.com;

    ssl_certificate     /etc/letsencrypt/live/millcreekcatalog.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/millcreekcatalog.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/millcreekcatalog.com;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
